# ==============================================================================
# Local RAG Chatbot — Docker Compose
# ==============================================================================
# Development configuration. Run with: docker compose up --build
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # Backend — FastAPI application
  # ----------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: rag-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/tests:/app/tests
      - backend-uploads:/app/uploads
      - model-cache:/root/.cache
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/v1/health'); r.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - rag-network

  # ----------------------------------------------------------------------------
  # Frontend — Next.js application
  # ----------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: rag-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - rag-network

  # ----------------------------------------------------------------------------
  # PostgreSQL — Relational database
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-raguser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ragpassword}
      POSTGRES_DB: ${POSTGRES_DB:-rag_chatbot}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-rag_chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - rag-network

  # ----------------------------------------------------------------------------
  # Qdrant — Vector database
  # ----------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - rag-network

  # ----------------------------------------------------------------------------
  # Ollama — Local LLM server
  # ----------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama
    # Uncomment the following for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped
    networks:
      - rag-network

# ==============================================================================
# Volumes — Persistent data storage
# ==============================================================================
volumes:
  postgres-data:
    driver: local
  qdrant-data:
    driver: local
  ollama-data:
    driver: local
  backend-uploads:
    driver: local
  model-cache:
    driver: local

# ==============================================================================
# Networks
# ==============================================================================
networks:
  rag-network:
    driver: bridge
